{% extends 'tickets/base.html' %}
{% block auth_content %}
<div style="min-height: 520px; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: var(--border-radius-lg); padding: 3rem 1rem; position: relative; overflow: hidden;">
    <div style="position: absolute; top: -80px; left: -80px; width: 300px; height: 300px; border-radius: 50%; background: rgba(26, 99, 200, 0.08); pointer-events: none;"></div>
    <div style="position: absolute; bottom: -60px; right: -60px; width: 240px; height: 240px; border-radius: 50%; background: rgba(29, 158, 117, 0.07); pointer-events: none;"></div>

    <div style="display: flex; flex-direction: column; align-items: center; margin-bottom: 2rem; gap: 6px;">
        <div style="width: 52px; height: 52px; border-radius: 14px; background: #ffffff; display: flex; align-items: center; justify-content: center; margin-bottom: 4px;">
            <svg width="28" height="20" viewBox="0 0 28 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="0" y="4" width="13" height="13" rx="6.5" stroke="#1a1a1a" stroke-width="2.2" fill="none"/>
                <rect x="10" y="2" width="16" height="16" rx="8" fill="#1D9E75"/>
                <circle cx="18" cy="10" r="4.5" fill="white"/>
            </svg>
        </div>
        <p style="margin:0; font-size: 20px; font-weight: 500; color: #ffffff; letter-spacing: -0.3px;">inission</p>
        <p style="margin:0; font-size: 12px; color: rgba(255,255,255,0.45); letter-spacing: 0.4px; text-transform: uppercase; font-size: 11px;">Supervision Industrielle · Pannes Machines</p>
    </div>

    <div style="width: 100%; max-width: 380px; background: rgba(255,255,255,0.04); border: 0.5px solid rgba(255,255,255,0.1); border-radius: var(--border-radius-lg); padding: 2rem; backdrop-filter: blur(0px);">
        <p style="margin: 0 0 1.5rem; font-size: 15px; font-weight: 500; color: #ffffff; text-align: center;">Connexion</p>
        {% if form.errors %}
            <div class="alert alert-danger">Identifiants incorrects.</div>
        {% endif %}
        <form method="post" autocomplete="off">
            {% csrf_token %}
            <div style="margin-bottom: 12px;">
                <label style="display: block; font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 6px; letter-spacing: 0.3px;">Nom d'utilisateur</label>
                <div style="position: relative;">
                    <svg style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); opacity: 0.4;" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    <input type="text" name="username" placeholder="Entrez votre identifiant" autofocus required style="width: 100%; box-sizing: border-box; padding: 10px 12px 10px 38px; background: rgba(255,255,255,0.06); border: 0.5px solid rgba(255,255,255,0.12); border-radius: var(--border-radius-md); color: #ffffff; font-size: 14px; outline: none;" onfocus="this.style.borderColor='rgba(29,158,117,0.6)'; this.style.background='rgba(29,158,117,0.08)'" onblur="this.style.borderColor='rgba(255,255,255,0.12)'; this.style.background='rgba(255,255,255,0.06)'"/>
                </div>
            </div>
            <div style="margin-bottom: 20px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
                    <label style="font-size: 12px; color: rgba(255,255,255,0.5); letter-spacing: 0.3px;">Mot de passe</label>
                    <a href="#" style="font-size: 12px; color: #1D9E75; text-decoration: none;">Mot de passe oublié ?</a>
                </div>
                <div style="position: relative;">
                    <svg style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); opacity: 0.4;" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    <input type="password" name="password" placeholder="••••••••" required style="width: 100%; box-sizing: border-box; padding: 10px 12px 10px 38px; background: rgba(255,255,255,0.06); border: 0.5px solid rgba(255,255,255,0.12); border-radius: var(--border-radius-md); color: #ffffff; font-size: 14px; outline: none;" onfocus="this.style.borderColor='rgba(29,158,117,0.6)'; this.style.background='rgba(29,158,117,0.08)'" onblur="this.style.borderColor='rgba(255,255,255,0.12)'; this.style.background='rgba(255,255,255,0.06)'"/>
                </div>
            </div>
            <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 20px;">
                <input type="checkbox" id="remember" name="remember" style="accent-color: #1D9E75; width: 14px; height: 14px; cursor: pointer;"/>
                <label for="remember" style="font-size: 13px; color: rgba(255,255,255,0.5); cursor: pointer;">Se souvenir de moi</label>
            </div>
            <button type="submit" id="login-btn" style="width: 100%; padding: 11px; background: #1D9E75; border: none; border-radius: var(--border-radius-md); color: #ffffff; font-size: 14px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: opacity 0.15s;" onmouseover="this.style.opacity='0.88'" onmouseout="this.style.opacity='1'">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
                Se connecter
            </button>
        </form>
    </div>
    <p style="margin-top: 1.5rem; font-size: 11px; color: rgba(255,255,255,0.25); text-align: center;">© 2026 Inission · Accès sécurisé</p>
</div>
<script>
    // Loading state for button
    document.addEventListener('DOMContentLoaded', function() {
        var btn = document.getElementById('login-btn');
        if (btn) {
            btn.addEventListener('click', function() {
                var orig = btn.innerHTML;
                btn.innerHTML = '<span style="display:flex;align-items:center;gap:8px;"><span class="spinner-border spinner-border-sm" style="color:white;" role="status"></span> Connexion en cours…</span>';
                setTimeout(function(){ btn.innerHTML = orig; }, 2000);
            });
        }
    });
</script>
{% endblock %}
