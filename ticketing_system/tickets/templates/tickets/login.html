{% extends 'tickets/base.html' %}
{% block auth_content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center" 
     style="background: linear-gradient(135deg, #1a2332 0%, #0d1b2a 100%);">
    <div class="text-center" style="width: 400px;">
        <div style="background: white; width: 80px; height: 80px; border-radius: 20px; 
                    display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; 
                    position: relative; border: 2px solid #e0e0e0;">
            <style>
                .login-logo::before {
                    content: '';
                    position: absolute;
                    width: 24px; height: 24px;
                    border: 3px solid #000;
                    border-radius: 50%;
                    left: 18px;
                    top: 50%;
                    transform: translateY(-50%);
                }
                .login-logo::after {
                    content: '';
                    position: absolute;
                    width: 24px; height: 24px;
                    background: #00a896;
                    border-radius: 50%;
                    right: 18px;
                    top: 50%;
                    transform: translateY(-50%);
                }
            </style>
            <div class="login-logo" style="width: 100%; height: 100%; position: relative;"></div>
        </div>
        <h3 class="text-white mb-1">inission</h3>
        <p class="text-white-50 mb-4">Supervision Industrielle - Pannes Machines</p>
        
        <div class="card border-0" style="border-radius: 16px;">
            <div class="card-body p-4">
                <h5 class="mb-4">Connexion</h5>
                {% if form.errors %}
                <div class="alert alert-danger">Identifiants incorrects.</div>
                {% endif %}
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <input type="text" name="username" class="form-control form-control-lg" 
                               placeholder="Nom d'utilisateur" autofocus>
                    </div>
                    <div class="mb-4">
                        <input type="password" name="password" class="form-control form-control-lg" 
                               placeholder="Mot de passe">
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-100">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Se connecter
                    </button>
                </form>
            </div>
        </div>
        
    </div>
</div>
{% endblock %}
