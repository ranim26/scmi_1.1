{% load static %}
<style>
  #cb-btn {
    position: fixed; bottom: 28px; right: 28px;
    width: 54px; height: 54px; border-radius: 50%;
    background: #2563eb; color: #fff;
    border: 2px solid #60a5fa; font-size: 22px;
    cursor: pointer; z-index: 1000;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 12px rgba(37,99,235,.18);
    transition: transform .15s;
  }
  #cb-btn:hover { transform: scale(1.08); background: #1d4ed8; }

  #cb-window {
    display: none; flex-direction: column;
    position: fixed; bottom: 96px; right: 28px;
    width: 370px; height: 500px;
    background: #f8fafc; border: 1.5px solid #60a5fa;
    border-radius: 12px; z-index: 999;
    overflow: hidden; box-shadow: 0 8px 32px rgba(37,99,235,.12);
  }
  #cb-window.open { display: flex; }

  #cb-header {
    background: #2563eb; border-bottom: 1.5px solid #60a5fa;
    padding: 12px 16px; display: flex;
    align-items: center; justify-content: space-between;
  }
  #cb-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #60a5fa; box-shadow: 0 0 6px #60a5fa;
    animation: cbpulse 2s ease-in-out infinite; margin-right: 10px;
  }
  @keyframes cbpulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  #cb-title { color: #fff; font-size: 13px; font-weight: 600; }
  #cb-subtitle { color: #dbeafe; font-size: 11px; }
  #cb-close { color: #dbeafe; background: none; border: none; cursor: pointer; font-size: 18px; }

  #cb-messages {
    flex: 1; overflow-y: auto; padding: 14px;
    display: flex; flex-direction: column; gap: 10px;
    background: #f1f5f9;
  }
  .cb-msg {
    max-width: 82%; padding: 9px 13px; border-radius: 10px;
    font-size: 13.5px; line-height: 1.55; animation: cbfade .2s ease;
  }
  @keyframes cbfade { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:none} }
  .cb-user { align-self: flex-end; background: #2563eb; color: #fff; border: 1px solid #60a5fa; border-bottom-right-radius: 3px; }
  .cb-assistant { align-self: flex-start; background: #e0e7ff; color: #1e293b; border: 1px solid #60a5fa; border-bottom-left-radius: 3px; white-space: pre-wrap; }

  #cb-footer {
    border-top: 1.5px solid #60a5fa; padding: 10px 12px;
    display: flex; gap: 8px; background: #f8fafc;
  }
  #cb-input {
    flex: 1; background: #fff; color: #1e293b;
    border: 1.5px solid #60a5fa; border-radius: 8px;
    padding: 8px 12px; font-size: 13px; outline: none;
  }
  #cb-input:focus { border-color: #2563eb; }
  #cb-send {
    width: 36px; height: 36px; border-radius: 8px;
    background: #2563eb; color: #fff;
    border: none; cursor: pointer; font-size: 18px; font-weight: 700;
  }
  #cb-send:hover { background: #1d4ed8; }
</style>

<button id="cb-btn" onclick="cbToggle()" title="Assistant Maintenance">
  <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="none" viewBox="0 0 24 24"><path fill="#9FE1CB" d="M12 3C6.477 3 2 6.797 2 11c0 1.61.67 3.13 1.87 4.39-.13.7-.47 2.13-.7 2.97-.12.41.29.77.7.62.85-.31 2.32-.85 3.01-1.1C8.87 18.6 10.39 19 12 19c5.523 0 10-3.797 10-8s-4.477-8-10-8Zm0 14c-1.47 0-2.89-.34-4.09-.98a.75.75 0 0 0-.62-.06c-.41.15-1.13.41-1.85.66.18-.7.38-1.54.45-1.87a.75.75 0 0 0-.2-.7C3.54 13.1 3 12.07 3 11c0-3.59 4.03-6.5 9-6.5s9 2.91 9 6.5-4.03 6.5-9 6.5Z"/></svg>
</button>

<div id="cb-window">
  <div id="cb-header">
    <div style="display:flex;align-items:center">
      <div id="cb-dot"></div>
      <div>
        <div id="cb-title">ASSISTANT </div>
      </div>
    </div>
    <button id="cb-close" onclick="cbToggle()">✕</button>
  </div>

  <div id="cb-messages">
    <div class="cb-msg cb-assistant">Bonjour ! Je suis votre assistant technique. Comment puis-je vous aider ?</div>
  </div>

  <div id="cb-footer">
    <input id="cb-input" type="text" placeholder="Posez votre question..."
      onkeydown="if(event.key==='Enter') cbSend()">
    <button id="cb-send" onclick="cbSend()">↑</button>
  </div>
</div>

<script>
const cbSession = 'session_{{ user.id }}_' + Date.now();

function cbToggle() {
  document.getElementById('cb-window').classList.toggle('open');
  if (document.getElementById('cb-window').classList.contains('open'))
    document.getElementById('cb-input').focus();
}

function cbAddMsg(role, text) {
  const msgs = document.getElementById('cb-messages');
  const d = document.createElement('div');
  d.className = 'cb-msg cb-' + role;
  d.textContent = text;
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
  return d;
}

async function cbSend() {
  const input = document.getElementById('cb-input');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  input.disabled = true;

  cbAddMsg('user', msg);
  const typing = cbAddMsg('assistant', '...');

  try {
    const res = await fetch("{% url 'chat_api' %}", {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-CSRFToken': '{{ csrf_token }}'
      },
      body: JSON.stringify({ message: msg, session_id: cbSession })
    });
    const data = await res.json();
    typing.textContent = data.reply || data.error;
  } catch(e) {
    typing.textContent = "Erreur de connexion. Vérifiez qu'Ollama est démarré.";
  }

  input.disabled = false;
  input.focus();
}
</script>
