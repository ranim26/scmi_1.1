
{% extends 'tickets/base.html' %}
{% load crispy_forms_tags %}

{% block title %}Nouvelle Demande{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2 class="mb-4">Nouvelle ticket</h2>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {% for field in form %}
            {{ field|as_crispy_field }}
        {% endfor %}
        <button type="submit" class="btn btn-primary">{{ action|default:'Créer' }}</button>
        <a href="{% url 'demande_dashboard' %}" class="btn btn-secondary ms-2">Annuler</a>
    </form>
</div>
{% endblock %}
