{% extends "tickets/base.html" %}
{% load static %}

{% block content %}
<div class="container-fluid py-4">
    <!-- Header avec contrôles -->
    <div class="row mb-4">
        <div class="col-12">
            <div class="card">
                <div class="card-body">
                    <div class="row align-items-center">
                        <!-- Boutons de vue -->
                        <div class="col-md-3 mb-3 mb-md-0">
                            <div class="btn-group w-100" role="group">
                                <button type="button" class="btn btn-outline-primary active" id="btn-cards" onclick="changeView('cards')">
                                    <i class="bi bi-grid-3x3-gap"></i> Cartes
                                </button>
                                <button type="button" class="btn btn-outline-primary" id="btn-list" onclick="changeView('list')">
                                    <i class="bi bi-list-ul"></i> Liste
                                </button>
                                <button type="button" class="btn btn-outline-primary" id="btn-kanban" onclick="changeView('kanban')">
                                    <i class="bi bi-kanban"></i> Kanban
                                </button>
                            </div>
                        </div>
                        
                        <!-- Filtres -->
                        <div class="col-md-6 mb-3 mb-md-0">
                            <div class="row g-2">
                                <div class="col-6">
                                    <select class="form-select" id="filter-status" onchange="applyFilters()">
                                        <option value="">Tous les statuts</option>
                                        <option value="En attente">En attente</option>
                                        <option value="En cours">En cours</option>
                                        <option value="Validée">Validée</option>
                                        <option value="Terminée">Terminée</option>
                                        <option value="Annulée">Annulée</option>
                                    </select>
                                </div>
                                <div class="col-6">
                                    <select class="form-select" id="filter-service" onchange="applyFilters()">
                                        <option value="">Tous les services</option>
                                        <option value="informatique">Informatique</option>
                                        <option value="engineer">Engineering</option>
                                        <option value="maintenance">Maintenance</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Actions -->
                        <div class="col-md-3">
                            <div class="d-flex gap-2">
                                <button class="btn btn-success flex-fill" onclick="saveFilters()">
                                    <i class="bi bi-save"></i> 
                                    <span id="saveBtnText">Sauvegarder</span>
                                    <i class="bi bi-check-circle text-success d-none" id="saveIndicator"></i>
                                </button>
                                <div class="form-check form-switch">
                                    <input class="form-check-input" type="checkbox" id="darkModeToggle">
                                    <label class="form-check-label" for="darkModeToggle">
                                        <i class="bi bi-moon"></i>
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Statistiques -->
    <div class="row mb-4">
        <div class="col-md-2 col-sm-4 col-6 mb-3">
            <div class="card text-center">
                <div class="card-body">
                    <h5 class="card-title text-primary mb-0" id="stat-total">0</h5>
                    <p class="card-text small text-muted">Total</p>
                </div>
            </div>
        </div>
        <div class="col-md-2 col-sm-4 col-6 mb-3">
            <div class="card text-center">
                <div class="card-body">
                    <h5 class="card-title text-warning mb-0" id="stat-attente">0</h5>
                    <p class="card-text small text-muted">En attente</p>
                </div>
            </div>
        </div>
        <div class="col-md-2 col-sm-4 col-6 mb-3">
            <div class="card text-center">
                <div class="card-body">
                    <h5 class="card-title text-info mb-0" id="stat-cours">0</h5>
                    <p class="card-text small text-muted">En cours</p>
                </div>
            </div>
        </div>
        <div class="col-md-2 col-sm-4 col-6 mb-3">
            <div class="card text-center">
                <div class="card-body">
                    <h5 class="card-title text-success mb-0" id="stat-validee">0</h5>
                    <p class="card-text small text-muted">Validée</p>
                </div>
            </div>
        </div>
        <div class="col-md-2 col-sm-4 col-6 mb-3">
            <div class="card text-center">
                <div class="card-body">
                    <h5 class="card-title text-success mb-0" id="stat-terminee">0</h5>
                    <p class="card-text small text-muted">Terminée</p>
                </div>
            </div>
        </div>
        <div class="col-md-2 col-sm-4 col-6 mb-3">
            <div class="card text-center">
                <div class="card-body">
                    <h5 class="card-title text-danger mb-0" id="stat-annulee">0</h5>
                    <p class="card-text small text-muted">Annulée</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Conteneur des tickets -->
    <div id="tickets-container">
        <!-- Le contenu sera généré par JavaScript -->
    </div>
</div>

<!-- Modal pour les détails du ticket -->
<div class="modal fade" id="ticketModal" tabindex="-1" aria-labelledby="ticketModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">Détails du ticket</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Le contenu sera généré par JavaScript -->
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fermer</button>
                <button type="button" class="btn btn-primary">Modifier</button>
            </div>
        </div>
    </div>
</div>

<style>
/* Styles pour le mode sombre */
[data-theme="dark"] {
    background-color: #1a1a1a;
    color: #ffffff;
}

[data-theme="dark"] .card {
    background-color: #2d2d2d;
    border-color: #404040;
}

[data-theme="dark"] .table {
    color: #ffffff;
}

[data-theme="dark"] .table-dark {
    background-color: #404040;
}

[data-theme="dark"] .modal-content {
    background-color: #2d2d2d;
    color: #ffffff;
}

/* Styles pour les priorités */
.priority-haute {
    background-color: #dc3545;
    color: white;
}

.priority-moyenne {
    background-color: #ffc107;
    color: black;
}

.priority-basse {
    background-color: #198754;
    color: white;
}

/* Styles pour Kanban */
.kanban-column {
    min-height: 400px;
}

.kanban-card {
    cursor: move;
    transition: transform 0.2s;
}

.kanban-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
}

.kanban-card.dragging {
    opacity: 0.5;
}

.kanban-column.drag-over {
    background-color: #f0f0f0;
    border: 2px dashed #007bff;
}

[data-theme="dark"] .kanban-column.drag-over {
    background-color: #404040;
    border-color: #007bff;
}

/* Responsive */
@media (max-width: 768px) {
    .btn-group .btn {
        font-size: 0.8rem;
        padding: 0.25rem 0.5rem;
    }
}

/* Animation pour les statistiques */
.card {
    transition: transform 0.2s;
}

.card:hover {
    transform: translateY(-2px);
}

/* Bouton de sauvegarde animé */
#saveIndicator {
    animation: fadeInOut 2s ease-in-out;
}

@keyframes fadeInOut {
    0% { opacity: 0; }
    50% { opacity: 1; }
    100% { opacity: 0; }
}
</style>

<script>
// Données des tickets depuis Django
const ticketsData = {{ tickets_data_json|safe }};

// État actuel
let currentView = 'cards';
let currentFilters = { status: '', service: '' };
let tickets = [...ticketsData];

// Initialisation
document.addEventListener('DOMContentLoaded', () => {
    loadSavedPreferences();
    renderTickets();
    updateStats();
    setupDragAndDrop();
});

// 1️⃣ Changer de vue
function changeView(view) {
    currentView = view;
    
    // Mise à jour des boutons actifs
    document.querySelectorAll('.btn-group .btn').forEach(btn => btn.classList.remove('active'));
    document.getElementById(`btn-${view}`).classList.add('active');
    
    // Sauvegarder la préférence
    localStorage.setItem('preferredView', view);
    
    renderTickets();
}

// 2️⃣ Appliquer les filtres
function applyFilters() {
    currentFilters.status = document.getElementById('filter-status').value;
    currentFilters.service = document.getElementById('filter-service').value;
    renderTickets();
    updateStats();
}

// 3️⃣ Sauvegarder les filtres
function saveFilters() {
    localStorage.setItem('savedFilters', JSON.stringify(currentFilters));
    
    // Feedback visuel
    const saveBtnText = document.getElementById('saveBtnText');
    const saveIndicator = document.getElementById('saveIndicator');
    const originalText = saveBtnText.textContent;
    
    saveBtnText.textContent = 'Sauvegardé !';
    saveIndicator.classList.remove('d-none');
    
    setTimeout(() => {
        saveBtnText.textContent = originalText;
        saveIndicator.classList.add('d-none');
    },2000);
}

// 4️⃣ Charger les préférences sauvegardées
function loadSavedPreferences() {
    // Vue préférée
    const savedView = localStorage.getItem('preferredView') || 'cards';
    currentView = savedView;
    document.getElementById(`btn-${savedView}`).classList.add('active');
    
    // Filtres sauvegardés
    const savedFilters = localStorage.getItem('savedFilters');
    if (savedFilters) {
        currentFilters = JSON.parse(savedFilters);
        if (currentFilters.status) {
            document.getElementById('filter-status').value = currentFilters.status;
        }
        if (currentFilters.service) {
            document.getElementById('filter-service').value = currentFilters.service;
        }
    }
    
    // Dark mode
    const darkMode = localStorage.getItem('darkMode') === 'true';
    if (darkMode) {
        document.body.setAttribute('data-theme', 'dark');
        document.getElementById('darkModeToggle').checked = true;
    }
    
    // Event listener pour dark mode
    document.getElementById('darkModeToggle').addEventListener('change', toggleDarkMode);
}

// 5️⃣ Toggle Dark Mode
function toggleDarkMode() {
    const isDark = document.getElementById('darkModeToggle').checked;
    document.body.setAttribute('data-theme', isDark ? 'dark' : 'light');
    localStorage.setItem('darkMode', isDark);
}

// 6️⃣ Rendu des tickets selon la vue
function renderTickets() {
    const container = document.getElementById('tickets-container');
    const filteredTickets = filterTickets();
    
    if (currentView === 'cards') {
        container.innerHTML = renderCardsView(filteredTickets);
    } else if (currentView === 'list') {
        container.innerHTML = renderListView(filteredTickets);
    } else if (currentView === 'kanban') {
        container.innerHTML = renderKanbanView(filteredTickets);
    }
    
    // Réinitialiser les event listeners
    setupModalListeners();
}

// Filtrer les tickets
function filterTickets() {
    return tickets.filter(ticket => {
        if (currentFilters.status && ticket.status !== currentFilters.status) {
            return false;
        }
        if (currentFilters.service && ticket.service !== currentFilters.service) {
            return false;
        }
        return true;
    });
}

// Rendu Vue Cartes
function renderCardsView(tickets) {
    if (tickets.length === 0) {
        return '<div class="alert alert-info">Aucun ticket trouvé</div>';
    }
    
    return `
        <div class="row g-3">
            ${tickets.map(ticket => `
                <div class="col-md-6 col-lg-4 ticket-card">
                    <div class="card h-100">
                        <div class="card-header d-flex justify-content-between align-items-center">
                            <span class="badge priority-${ticket.priority.toLowerCase()}">${ticket.priority}</span>
                            <span class="text-muted">#${ticket.id}</span>
                        </div>
                        <div class="card-body">
                            <h5 class="card-title">${ticket.title}</h5>
                            <p class="card-text">
                                <strong><i class="bi bi-person"></i> Demandeur:</strong> ${ticket.demander}<br>
                                <strong><i class="bi bi-folder"></i> Service:</strong> ${ticket.service}<br>
                                <strong><i class="bi bi-pc-display"></i> Machine:</strong> ${ticket.machine}<br>
                                <strong><i class="bi bi-calendar"></i> Date:</strong> ${ticket.date}
                            </p>
                        </div>
                        <div class="card-footer d-flex justify-content-between align-items-center">
                            <span class="badge bg-${getStatusColor(ticket.status)}">${ticket.status}</span>
                            <div class="btn-group btn-group-sm">
                                <button class="btn btn-outline-primary" onclick="viewTicket('${ticket.id}')">
                                    <i class="bi bi-eye"></i>
                                </button>
                                <button class="btn btn-outline-danger" onclick="printTicketPDF('${ticket.id}')">
                                    <i class="bi bi-file-earmark-pdf"></i>
                                </button>
                                <button class="btn btn-outline-secondary">
                                    <i class="bi bi-pencil"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('')}
        </div>
    `;
}

// Rendu Vue Liste
function renderListView(tickets) {
    if (tickets.length === 0) {
        return '<div class="alert alert-info">Aucun ticket trouvé</div>';
    }
    
    return `
        <div class="table-responsive">
            <table class="table table-striped table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Titre</th>
                        <th>Demandeur</th>
                        <th>Service</th>
                        <th>Machine</th>
                        <th>Statut</th>
                        <th>Priorité</th>
                        <th>Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    ${tickets.map(ticket => `
                        <tr>
                            <td><strong>#${ticket.id}</strong></td>
                            <td>${ticket.title}</td>
                            <td>${ticket.demander}</td>
                            <td>${ticket.service}</td>
                            <td>${ticket.machine}</td>
                            <td><span class="badge bg-${getStatusColor(ticket.status)}">${ticket.status}</span></td>
                            <td><span class="badge priority-${ticket.priority.toLowerCase()}">${ticket.priority}</span></td>
                            <td>${ticket.date}</td>
                            <td>
                                <button class="btn btn-sm btn-outline-primary" onclick="viewTicket('${ticket.id}')">
                                    <i class="bi bi-eye"></i>
                                </button>
                                <button class="btn btn-sm btn-outline-danger" onclick="printTicketPDF('${ticket.id}')">
                                    <i class="bi bi-file-earmark-pdf"></i>
                                </button>
                                <button class="btn btn-sm btn-outline-secondary">
                                    <i class="bi bi-pencil"></i>
                                </button>
                            </td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        </div>
    `;
}

// Rendu Vue Kanban
function renderKanbanView(tickets) {
    const columns = {
        'En attente': [],
        'En cours': [],
        'Validée': [],
        'Terminée': []
    };
    
    tickets.forEach(ticket => {
        if (columns[ticket.status]) {
            columns[ticket.status].push(ticket);
        }
    });
    
    return `
        <div class="row g-3">
            ${Object.entries(columns).map(([status, statusTickets]) => `
                <div class="col-md-3 col-sm-6">
                    <div class="card kanban-column h-100">
                        <div class="card-header fw-bold text-center bg-${getStatusColor(status)} text-white">
                            ${status} (${statusTickets.length})
                        </div>
                        <div class="card-body" style="min-height: 400px;" data-status="${status}">
                            ${statusTickets.map(ticket => `
                                <div class="card mb-2 kanban-card" draggable="true" data-ticket-id="${ticket.id}">
                                    <div class="card-body p-2">
                                        <div class="d-flex justify-content-between mb-2">
                                            <small class="text-muted">#${ticket.id}</small>
                                            <span class="badge priority-${ticket.priority.toLowerCase()}">${ticket.priority}</span>
                                        </div>
                                        <h6 class="mt-2 mb-1">${ticket.title}</h6>
                                        <small class="text-muted d-block"><i class="bi bi-person"></i> ${ticket.demander}</small>
                                        <small class="text-muted d-block"><i class="bi bi-folder"></i> ${ticket.service}</small>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `).join('')}
        </div>
    `;
}

// Helper: Couleur de statut
function getStatusColor(status) {
    const colors = {
        'En attente': 'warning',
        'En cours': 'info',
        'Validée': 'success',
        'Terminée': 'success',
        'Annulée': 'danger'
    };
    return colors[status] || 'secondary';
}

// Helper: Couleur de priorité
function getPriorityColor(priority) {
    const colors = {
        'Haute': 'danger',
        'Moyenne': 'warning',
        'Basse': 'success'
    };
    return colors[priority] || 'secondary';
}

// Mettre à jour les statistiques
function updateStats() {
    const filteredTickets = filterTickets();
    
    document.getElementById('stat-total').textContent = filteredTickets.length;
    document.getElementById('stat-attente').textContent = filteredTickets.filter(t => t.status === 'En attente').length;
    document.getElementById('stat-cours').textContent = filteredTickets.filter(t => t.status === 'En cours').length;
    document.getElementById('stat-validee').textContent = filteredTickets.filter(t => t.status === 'Validée').length;
    document.getElementById('stat-terminee').textContent = filteredTickets.filter(t => t.status === 'Terminée').length;
    document.getElementById('stat-annulee').textContent = filteredTickets.filter(t => t.status === 'Annulée').length;
}

// Voir les détails d'un ticket
function viewTicket(ticketId) {
    const ticket = tickets.find(t => t.id === ticketId);
    if (!ticket) return;
    
    document.getElementById('modalTitle').textContent = `Ticket #${ticket.id} - ${ticket.title}`;
    document.getElementById('modalBody').innerHTML = `
        <div class="mb-3">
            <strong><i class="bi bi-person"></i> Demandeur:</strong> ${ticket.demander}
        </div>
        <div class="mb-3">
            <strong><i class="bi bi-folder"></i> Service:</strong> ${ticket.service}
        </div>
        <div class="mb-3">
            <strong><i class="bi bi-pc-display"></i> Machine:</strong> ${ticket.machine}
        </div>
        <div class="mb-3">
            <strong><i class="bi bi-calendar"></i> Date:</strong> ${ticket.date}
        </div>
        <div class="mb-3">
            <strong><i class="bi bi-flag"></i> Priorité:</strong> 
            <span class="badge priority-${ticket.priority.toLowerCase()}">${ticket.priority}</span>
        </div>
        <div class="mb-3">
            <strong><i class="bi bi-check-circle"></i> Statut:</strong> 
            <span class="badge bg-${getStatusColor(ticket.status)}">${ticket.status}</span>
        </div>
        <div class="mb-3">
            <strong><i class="bi bi-file-text"></i> Description:</strong><br>
            ${ticket.description}
        </div>
    `;
    
    const modal = new bootstrap.Modal(document.getElementById('ticketModal'));
    modal.show();
}

// Setup des event listeners pour la modal
function setupModalListeners() {
    // Les boutons sont gérés par delegation d'événements
}

// Setup Drag and Drop pour Kanban
function setupDragAndDrop() {
    document.addEventListener('dragstart', (e) => {
        if (e.target.classList.contains('kanban-card')) {
            e.target.classList.add('dragging');
            e.dataTransfer.setData('text/plain', e.target.dataset.ticketId);
        }
    });
    
    document.addEventListener('dragend', (e) => {
        if (e.target.classList.contains('kanban-card')) {
            e.target.classList.remove('dragging');
        }
    });
    
    document.addEventListener('dragover', (e) => {
        if (e.target.closest('.kanban-column')) {
            e.preventDefault();
            e.target.closest('.kanban-column').classList.add('drag-over');
        }
    });
    
    document.addEventListener('dragleave', (e) => {
        if (e.target.closest('.kanban-column')) {
            e.target.closest('.kanban-column').classList.remove('drag-over');
        }
    });
    
    document.addEventListener('drop', (e) => {
        const column = e.target.closest('.kanban-column');
        if (column) {
            e.preventDefault();
            column.classList.remove('drag-over');
            const ticketId = e.dataTransfer.getData('text/plain');
            const newStatus = column.dataset.status;
            updateTicketStatus(ticketId, newStatus);
        }
    });
}

// Mettre à jour le statut d'un ticket
function updateTicketStatus(ticketId, newStatus) {
    const ticket = tickets.find(t => t.id === ticketId);
    if (ticket) {
        ticket.status = newStatus;
        renderTickets();
        updateStats();
        
        // Ici, vous feriez un appel API pour sauvegarder en base de données
        console.log(`Ticket ${ticketId} déplacé vers: ${newStatus}`);
    }
}

// Imprimer un ticket en PDF
function printTicketPDF(ticketId) {
    const url = `/tickets/${ticketId}/pdf/`;
    window.open(url, '_blank');
}
</script>
{% endblock %}
