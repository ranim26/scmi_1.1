{% extends 'tickets/base.html' %}

{% block title %}Choisir mes machines{% endblock %}

{% block page_title %}<i class="bi bi-gear"></i> Choisir mes machines{% endblock %}

{% block content %}
<div class="container mt-4">
  <h2 class="mb-4">Sélectionnez vos machines</h2>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Enregistrer</button>
    <a href="{% url 'dashboard' %}" class="btn btn-secondary ms-2">Annuler</a>
  </form>
</div>
{% endblock %}
